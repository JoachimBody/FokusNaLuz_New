<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Błąd 404 – Nie znaleziono strony | FokusNaLuz</title>
    <meta name="description" content="Strona nie została znaleziona. Wróć na stronę główną FokusNaLuz." />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #111 0%, #050505 60%, #000 100%);
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 42rem;
        width: 100%;
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 1.75rem;
        backdrop-filter: blur(18px);
        background: rgba(15, 23, 42, 0.7);
        box-shadow: 0 24px 60px rgba(0,0,0,.35);
        padding: 3rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(3rem, 5vw, 5rem);
        letter-spacing: -0.05em;
      }
      p {
        margin: 1.5rem 0 0;
        line-height: 1.85;
        color: #cbd5e1;
        font-size: 1rem;
      }
      a {
        display: inline-flex;
        margin-top: 2rem;
        padding: 1rem 1.75rem;
        text-decoration: none;
        border-radius: 999px;
        background: linear-gradient(135deg, #8b5cf6, #38bdf8);
        color: white;
        font-weight: 600;
        box-shadow: 0 15px 30px rgba(56, 189, 248, 0.18);
        transition: transform .2s ease, box-shadow .2s ease;
      }
      a:hover {
        transform: translateY(-1px);
        box-shadow: 0 22px 40px rgba(56, 189, 248, 0.24);
      }
      .label {
        display: inline-flex;
        margin-bottom: 1rem;
        padding: .5rem 1rem;
        border-radius: 999px;
        background: rgba(255,255,255,.06);
        color: #a5b4fc;
        text-transform: uppercase;
        letter-spacing: .2em;
        font-size: .76rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="label">Błąd 404</span>
      <h1>Strona nie została znaleziona.</h1>
      <p>Wygląda na to, że trafiłeś w miejsce, które już nie istnieje lub zostało przeniesione. Kliknij poniżej, aby wrócić do głównej strony FokusNaLuz.</p>
      <a href="/">Wróć do strony głównej</a>
    </div>
  </body>
</html>
